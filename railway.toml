# Configuración para el servicio API en Railway.
# Root Directory: raíz del repo (para Prisma y workspaces).
#
# Flujo: Build → Pre-deploy (migraciones) → Start (solo Node) → Healthcheck.
# Así /health responde en segundos y "Deploying" no se alarga esperando migraciones.

[build]
builder = "RAILPACK"

[deploy]
preDeployCommand = "npx prisma migrate deploy"
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
